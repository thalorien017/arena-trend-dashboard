      for(var j=0;j<it.sampleNotes.length;j++){
        var n=it.sampleNotes[j];
        body+='<a class="ni" href="'+n.url+'" target="_blank" style="display:block;padding:8px 12px;margin:6px 0;background:#0d1117;border:1px solid #30363d;border-radius:6px;text-decoration:none;color:#e6edf3;font-size:12px">'+n.title+' <span style="color:#8b949e">'+f(n.likes)+'</span></a>';
      }
      body+='</div>';
    }
  }
  document.getElementById('pBody').innerHTML=body;
  document.getElementById('panel').className='sp open';
}

function closePanel(){
  document.getElementById('panel').className='sp';
  document.getElementById('mask').className='mask';
}
document.getElementById('mask').onclick=closePanel;
render();
</script>
</body>
</html>
