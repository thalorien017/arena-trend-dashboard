      card.className='card';
      card.style.borderLeft='3px solid #d2a84e';
      card.onclick=function(idx){return function(){showDetail(idx,2)}}(i);
      card.innerHTML='<div class="card-title">'+it.topic+'</div>'
        +'<div class="card-meta"><span class="badge badge-gold">'+it.tag+'</span>'
        +'<span class="badge badge-blue">'+it.game+'</span>'
        +'<span style="margin-left:auto">❤️'+f(it.totalLikes||0)+'</span>'
        +'<span class="score score-gold">'+it.heatScore+'</span></div>'
        +(it.analysis?'<div class="analysis">📊 <strong>'+it.analysis+'</strong></div>':'')
        +'<div class="bar"><div class="bar-fill bar-gold" style="width:'+it.heatScore+'%"></div></div>';
      g.appendChild(card);
    }
  }
}

function showDetail(idx,type){
  var it,html='<div style="max-width:500px;margin:40px auto;padding:24px;background:#0d1117;border:1px solid #30363d;border-radius:12px;position:relative">';
  html+='<button onclick="this.parentElement.parentElement.innerHTML=''" style="position:absolute;top:16px;right:16px;background:0;border:0;color:#8b949e;font-size:22px;cursor:pointer">✕</button>';
  
  if(type===0){
    it=D.sprouts[idx];
    html+='<div style="font-size:20px;font-weight:800;margin:8px 0 12px">'+(it.title||'---')+'</div>'
      +'<div style="font:bold 32px monospace;color:#f78166;margin-bottom:12px">'+(it.commentToLikeRatio||0).toFixed(2)+' <span style="font-size:12px;color:#8b949e;font-weight:400">评论/赞比</span></div>'
      +'<div style="display:flex;gap:8px;margin-bottom:16px"><span class="badge badge-blue">'+it.game+'</span><span class="badge badge-orange">讨论苗头</span></div>'
      +(it.analysis?'<div class="analysis">📊 <strong>'+it.analysis+'</strong></div>':'')
      +(it.suggestion?'<div class="suggestion">💡 '+it.suggestion+'</div>':'')
      +(it.sourceNoteUrl?'<a href="'+it.sourceNoteUrl+'" target="_blank" style="display:block;margin-top:12px;padding:10px;background:#161b22;border:1px solid #30363d;border-radius:8px;text-decoration:none;color:#e6edf3;font-size:13px">🔗 打开笔记</a>':'');
  }else if(type===1){
    it=D.hotspots[idx];
    html+='<div style="font-size:20px;font-weight:800;margin:8px 0 12px">'+it.title+'</div>'
      +'<div style="font:bold 32px monospace;color:#f85149;margin-bottom:12px">'+it.heatScore+' <span style="font-size:12px;color:#8b949e;font-weight:400">热度分</span></div>'
      +'<div style="display:flex;gap:8px;margin-bottom:16px"><span class="badge badge-blue">'+it.game+'</span><span class="badge badge-green">'+it.lifecycle+'</span></div>'
      +(it.analysis?'<div class="analysis">📊 <strong>'+it.analysis+'</strong></div>':'');
  }else{
    it=D.esports[idx];
    html+='<div style="font-size:20px;font-weight:800;margin:8px 0 12px">'+it.topic+'</div>'
      +'<div style="display:flex;gap:8px;margin-bottom:16px"><span class="badge badge-gold">'+it.tag+'</span><span class="badge badge-blue">'+it.game+'</span></div>'
      +(it.analysis?'<div class="analysis">📊 <strong>'+it.analysis+'</strong></div>':'')
      +(it.suggestion?'<div class="suggestion">💡 '+it.suggestion+'</div>':'');
    if(it.sampleNotes&&it.sampleNotes.length){
      html+='<div style="margin-top:16px;font-size:12px;color:#8b949e">📝 站内笔记</div>';
      for(var j=0;j<it.sampleNotes.length;j++){
        var n=it.sampleNotes[j];
        html+='<a href="'+n.url+'" target="_blank" style="display:block;padding:8px 12px;margin:6px 0;background:#161b22;border:1px solid #30363d;border-radius:6px;text-decoration:none;color:#e6edf3;font-size:12px">'+n.title+' <span style="color:#8b949e">'+f(n.likes)+'</span></a>';
      }
    }
  }
  html+='</div>';
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=html;
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove()};
  document.body.appendChild(overlay);
}

render();
</script>
</body>
</html>
