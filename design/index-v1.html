    s.innerHTML = '<strong>'+items.length+' 条讨论苗头</strong> · 信号=评论/赞比 · 覆盖 '+D.summary.totalGames+' 款游戏';
    c.innerHTML = items.map(i => {
      const ra = (i.commentToLikeRatio||0).toFixed(2);
      const tg = i.tgi||'均衡', tc = tg.includes('男')?'tgm':tg.includes('女')?'tgp':'tgn';
      return '<div class="cr" onclick="o(0,\''+i.id+'\')">'+
        '<div class="h"><span class="ti">'+(i.title||'---')+'</span><span class="sc o">'+ra+'</span></div>'+
        '<div class="m"><span class="tg tgm">'+i.game+'</span><span class="tg tgs">讨论苗头</span><span class="tg '+tc+'">'+tg+'</span><span style="margin-left:auto">💬 '+f(i.commentCount||0)+'</span></div>'+
        '<div class="pb"><div class="pf pfs" style="width:'+Math.min(ra*60,100)+'%"></div></div></div>';
    }).join('');
  } else if (tab === 1) {
    const items = boards.blueOcean;
    s.innerHTML = '<strong>'+items.length+' 条蓝海选题</strong> · 站外热+供给缺口';
    c.innerHTML = items.length ? items.map(i =>
      '<div class="cr"><div class="h"><span class="ti">'+i.title+'</span><span class="sc o">'+(i.externalScore||'-')+'</span></div>'+
      '<div class="m"><span class="tg tgm">'+i.game+'</span><span class="tg tgd">'+(i.direction||'待分类')+'</span><span style="color:var(--gr)">'+(i.supplyGap?'供给缺口':'')+'</span></div></div>'
    ).join('') : '<div class="e"><p style="font-size:48px">🔵</p><p><strong>暂无蓝海选题</strong></p><p>P1 redhot-collector 关键词扩展</p></div>';
  } else if (tab === 2) {
    const items = boards.hotspots;
    s.innerHTML = '<strong>'+items.length+' 条热点</strong> · 热度分排序';
    c.innerHTML = items.map(i =>
      '<div class="cr" onclick="o(1,\''+i.id+'\')">'+
      '<div class="h"><span class="ti">'+i.title+'</span><span class="sc rd">'+i.heatScore+'</span></div>'+
      '<div class="m"><span class="tg tgm">'+i.game+'</span><span class="tg tgr">'+(i.channelType||'社区热点')+'</span><span class="tg tgl">'+(i.lifecycle||'上升期')+'</span><span style="margin-left:auto">📝 '+f(i.cumulativeNotes)+' · +'+i.last24hGrowth+' 24h</span></div>'+
      '<div class="pb"><div class="pf pfh" style="width:'+i.heatScore+'%"></div></div></div>'
    ).join('');
  } else {
    const items = boards.esports;
    s.innerHTML = '<strong>'+items.length+' 项赛事</strong> · '+items.filter(e=>e.sampleNotes&&e.sampleNotes.length).length+' 项有站内数据';
    c.innerHTML = items.map(i => {
      const n = i.sampleNotes&&i.sampleNotes[0];
      return '<div class="cr tc" onclick="o(2,\''+i.id+'\')">'+
        '<div class="h"><span class="ti">'+i.tournament+'</span><span class="sc gd">'+i.heatScore+'</span></div>'+
        '<div class="m"><span class="tg tgm">'+i.game+'</span><span class="tg tgd">'+i.type+'</span><span>📅 '+i.date+'</span><span>📍 '+i.venue+'</span></div>'+
        (n ? '<div class="m" style="margin-top:4px;font-size:11px">📄 '+n.title+' · '+f(n.likes)+'赞</div>' : '')+
        '<div class="pb"><div class="pf pfe" style="width:'+i.heatScore+'%"></div></div></div>';
    }).join('');
  }
}

function o(type, id) {
  const dr = document.getElementById('dr'), ov = document.getElementById('ov');
  let item, h = '<button style="position:absolute;top:16px;right:16px;background:0;border:0;color:var(--dim);font-size:20px;cursor:pointer" onclick="cl()">✕</button>';
  
  if (type === 0) {
    item = boards.discussionSprouts.find(i=>i.id===id);
    h += '<div style="font-size:20px;font-weight:700;margin-bottom:16px;margin-top:8px">'+(item.title||'---')+'</div>';
    h += '<div style="font:800 28px/1 Space Grotesk,monospace;color:var(--o);margin-bottom:12px">'+(item.commentToLikeRatio||0).toFixed(2)+' <span style="font-size:13px;color:var(--dim);font-weight:400">评论/赞比</span></div>';
    h += '<div style="display:flex;gap:8px;margin-bottom:8px;font-size:13px"><span>💬 '+f(item.commentCount||0)+' 评论</span></div>';
    h += '<div style="display:flex;gap:8px;margin:12px 0"><span class="tg tgm">'+item.game+'</span><span class="tg '+(item.tgi&&item.tgi.includes('男')?'tgm':item.tgi&&item.tgi.includes('女')?'tgp':'tgn')+'">'+(item.tgi||'均衡')+'</span></div>';
    if (item.sourceNoteUrl) h += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bd)"><h3 style="font-size:12px;color:var(--dim);margin-bottom:10px">样本笔记</h3><a class="nl" style="display:block;padding:10px;background:var(--card);border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;text-decoration:none;color:var(--text);font-size:13px" href="'+item.sourceNoteUrl+'" target="_blank">'+(item.title||'')+'<div class="np" style="font-size:11px;color:var(--dim);margin-top:3px">小红书 · 点击打开</div></a></div>';
  } else if (type === 1) {
    item = boards.hotspots.find(i=>i.id===id);
    h += '<div style="font-size:20px;font-weight:700;margin-bottom:16px;margin-top:8px">'+item.title+'</div>';
    h += '<div style="font:800 28px/1 Space Grotesk,monospace;color:var(--r);margin-bottom:12px">'+item.heatScore+' <span style="font-size:13px;color:var(--dim);font-weight:400">热度分</span></div>';
    h += '<div style="display:flex;gap:8px;margin:12px 0"><span class="tg tgl">'+item.lifecycle+'</span><span class="tg tgr">'+(item.channelType||'社区热点')+'</span><span class="tg tgm">'+item.game+'</span></div>';
    h += '<div style="font-size:13px;margin-bottom:8px">📝 '+f(item.cumulativeNotes)+' 笔记 · 📈 +'+(item.last24hGrowth||0)+' 24h</div>';
    if (item.internalNotes&&item.internalNotes.length) {
      h += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bd)"><h3 style="font-size:12px;color:var(--dim);margin-bottom:10px">样本笔记</h3>';
      item.internalNotes.forEach(n => h += '<a class="nl" style="display:block;padding:10px;background:var(--card);border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;text-decoration:none;color:var(--text);font-size:13px" href="'+n.url+'" target="_blank">'+n.title+'<div class="np" style="font-size:11px;color:var(--dim);margin-top:3px">'+n.platform+' · 点击打开</div></a></div>');
      h += '</div>';
    }
  } else if (type === 2) {
    item = boards.esports.find(i=>i.id===id);
    h += '<div style="font-size:20px;font-weight:700;margin-bottom:16px;margin-top:8px">'+item.tournament+'</div>';
    h += '<div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap"><span class="tg tgd">'+item.type+'</span><span>📅 '+item.date+'</span><span>📍 '+item.venue+'</span><span class="tg tgm">'+item.game+'</span></div>';
    if (item.sampleNotes&&item.sampleNotes.length) {
      h += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bd)"><h3 style="font-size:12px;color:var(--dim);margin-bottom:10px">站内相关笔记 ('+item.sampleNotes.length+')</h3>';
      item.sampleNotes.forEach(n => h += '<a class="nl" style="display:block;padding:10px;background:var(--card);border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;text-decoration:none;color:var(--text);font-size:13px" href="'+n.url+'" target="_blank">'+n.title+'<div class="np" style="font-size:11px;color:var(--dim);margin-top:3px">'+f(n.likes)+'赞 · 点击打开</div></a>');
      h += '</div>';
    }
  }
  dr.innerHTML = h;
  dr.style.transform = 'translateX(0)';
  ov.style.display = 'block';
}
function cl() {
  document.getElementById('dr').style.transform = 'translateX(100%)';
  document.getElementById('ov').style.display = 'none';
}
r();
</script></body></html>
